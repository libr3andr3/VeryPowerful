# Matrix Synapse — __DOMAIN__
# Generated by VeryPowerful CLI

services:
  synapse:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:__PORT__:8008"
    environment:
      - SYNAPSE_SERVER_NAME=__DOMAIN__
      - SYNAPSE_REPORT_STATS=no
      - SYNAPSE_ENABLE_REGISTRATION=true
      - SYNAPSE_NO_TLS=1
    volumes:
      - synapse_data:/data

volumes:
  synapse_data:
