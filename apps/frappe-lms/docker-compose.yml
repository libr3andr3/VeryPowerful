# Frappe LMS — __DOMAIN__
# Generated by VeryPowerful CLI

services:
  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_queue_data:/data

  app:
    image: frappe/erpnext:v16
    restart: unless-stopped
    ports:
      - "127.0.0.1:__PORT__:8000"
    environment:
      - FRAPPE_SITE_NAME=__DOMAIN__
      - ADMIN_PASSWORD=__ADMIN_PASSWORD__
    volumes:
      - sites_data:/home/frappe/frappe-bench/sites
    depends_on:
      - redis-cache
      - redis-queue
    entrypoint:
      - bash
      - -c
      - |
        set -e
        cd /home/frappe/frappe-bench
        if [ ! -f sites/__DOMAIN__/site_config.json ]; then
          bench new-site __DOMAIN__ --admin-password __ADMIN_PASSWORD__ --db-type sqlite --no-mariadb-socket --force
          bench set-config -g socketio_port 9000
          bench get-app payments https://github.com/frappe/payments
          bench build --app payments --force
          bench --site __DOMAIN__ install-app payments
          bench get-app lms https://github.com/frappe/lms
          bench build --app lms --force
          bench --site __DOMAIN__ install-app lms
        fi
        bench set-config -g developer_mode 1 2>/dev/null || true
        bench serve --port 8000

volumes:
  sites_data:
  redis_data:
  redis_queue_data:
