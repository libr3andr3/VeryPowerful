# Jitsi Meet — __DOMAIN__
# Generated by VeryPowerful CLI

services:
  web:
    image: jitsi/web:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:__PORT__:80"
    environment:
      - PUBLIC_URL=https://__DOMAIN__
      - ENABLE_COLIBRI_WEBSOCKET=1
      - DISABLE_HTTPS=1
      - JVB_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_COMPONENT_SECRET=__JITSI_SECRET__
      - JIGASI_XMPP_PASSWORD=__JITSI_SECRET__
      - JVB_BREWERY_MUC=jvbbrewery
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - TZ=UTC
    depends_on:
      - prosody
    volumes:
      - web_config:/config

  prosody:
    image: jitsi/prosody:stable
    restart: unless-stopped
    expose:
      - "5222"
      - "5280"
    environment:
      - JVB_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_COMPONENT_SECRET=__JITSI_SECRET__
      - JIGASI_XMPP_PASSWORD=__JITSI_SECRET__
      - TZ=UTC
    volumes:
      - prosody_config:/config

  jicofo:
    image: jitsi/jicofo:stable
    restart: unless-stopped
    environment:
      - JVB_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_COMPONENT_SECRET=__JITSI_SECRET__
      - JIGASI_XMPP_PASSWORD=__JITSI_SECRET__
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=meet.jitsi
      - JICOFO_AUTH_DOMAIN=***      - TZ=UTC
    depends_on:
      - prosody
    volumes:
      - jicofo_config:/config

  jvb:
    image: jitsi/jvb:stable
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    environment:
      - JVB_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_AUTH_PASSWORD=__JITSI_SECRET__
      - JICOFO_COMPONENT_SECRET=__JITSI_SECRET__
      - JIGASI_XMPP_PASSWORD=__JITSI_SECRET__
      - XMPP_SERVER=prosody
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_STUN_SERVERS=stun.l.google.com:19302,stun1.l.google.com:19302
      - TZ=UTC
    depends_on:
      - prosody

volumes:
  web_config:
  prosody_config:
  jicofo_config:
